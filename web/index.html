<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEX Highway Cameras</title>
    <style>
      :root {
        --bg: #f3efe7;
        --panel: rgba(255, 252, 246, 0.82);
        --text: #1d2a22;
        --muted: #506154;
        --accent: #0b6e4f;
        --accent-2: #d96c06;
        --border: rgba(29, 42, 34, 0.12);
        --shadow: 0 24px 60px rgba(26, 40, 32, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, rgba(217, 108, 6, 0.14), transparent 30%),
          radial-gradient(circle at top right, rgba(11, 110, 79, 0.14), transparent 28%),
          linear-gradient(180deg, #f9f5ee 0%, var(--bg) 100%);
      }

      .page {
        width: min(1200px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      .hero {
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
      }

      .hero-top {
        position: sticky;
        top: 0;
        z-index: 10;
        margin: -28px -28px 0;
        padding: 28px 28px 18px;
        border-bottom: 1px solid var(--border);
        border-radius: 28px 28px 0 0;
        background:
          linear-gradient(180deg, rgba(255, 252, 246, 0.98) 0%, rgba(255, 252, 246, 0.94) 100%);
        backdrop-filter: blur(14px);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 4.25rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .subtitle,
      .meta,
      .empty,
      .error {
        color: var(--muted);
      }

      .subtitle {
        max-width: 60ch;
        margin: 14px 0 0;
        font-size: 1.05rem;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 700;
        color: white;
        background: linear-gradient(135deg, var(--accent), #0a8f66);
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.04);
      }

      .meta {
        font-size: 0.95rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
        margin-top: 22px;
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 14px 32px rgba(26, 40, 32, 0.08);
        cursor: zoom-in;
        transition:
          transform 160ms ease,
          box-shadow 160ms ease;
      }

      .card:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 38px rgba(26, 40, 32, 0.14);
      }

      .card img {
        display: block;
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        background: #e8e0d3;
      }

      .card-body {
        padding: 14px 16px 16px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--accent-2);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .title {
        margin: 0;
        font-size: 1.05rem;
      }

      .footer {
        margin-top: 8px;
        font-size: 0.92rem;
        color: var(--muted);
      }

      .empty,
      .error {
        margin-top: 18px;
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px dashed var(--border);
        background: rgba(255, 255, 255, 0.6);
      }

      .lightbox[hidden] {
        display: none;
      }

      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(19, 31, 26, 0.72);
        backdrop-filter: blur(12px);
      }

      .lightbox-panel {
        width: min(1080px, 100%);
        max-height: calc(100vh - 48px);
        overflow: auto;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 28px;
        background: rgba(255, 252, 246, 0.98);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.28);
      }

      .lightbox-top {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: start;
        padding: 20px 20px 0;
      }

      .lightbox-copy {
        min-width: 0;
      }

      .lightbox-copy .eyebrow {
        margin-bottom: 8px;
      }

      .lightbox-copy .title {
        font-size: clamp(1.2rem, 3vw, 1.8rem);
      }

      .lightbox-close {
        flex-shrink: 0;
        min-width: 44px;
        padding: 10px 14px;
      }

      .lightbox-image {
        display: block;
        width: calc(100% - 40px);
        margin: 16px 20px 20px;
        border-radius: 20px;
        background: #e8e0d3;
      }

      @media (max-width: 720px) {
        .page {
          width: min(100% - 20px, 1200px);
          padding-top: 20px;
        }

        .hero {
          padding: 20px;
          border-radius: 22px;
        }

        .hero-top {
          top: 0;
          margin: -20px -20px 0;
          padding: 20px 20px 16px;
          border-radius: 22px 22px 0 0;
        }

        .lightbox {
          padding: 14px;
        }

        .lightbox-panel {
          max-height: calc(100vh - 28px);
          border-radius: 22px;
        }

        .lightbox-top {
          padding: 16px 16px 0;
        }

        .lightbox-image {
          width: calc(100% - 32px);
          margin: 14px 16px 16px;
          border-radius: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero-top">
          <h1>MEX Highway Cameras</h1>
          <p class="subtitle">
            All publicly available live camera feeds currently found for the MEX
            Highway from the official Lembaga Lebuhraya Malaysia public CCTV
            endpoints.
          </p>
          <div class="actions">
            <button id="refreshButton" type="button">Refresh Feeds</button>
            <div id="meta" class="meta">Loading live feeds…</div>
          </div>
        </div>
        <div id="error" class="error" hidden></div>
        <div id="empty" class="empty" hidden>No live feeds were available.</div>
        <section id="grid" class="grid" aria-live="polite"></section>
      </section>
    </main>
    <div id="lightbox" class="lightbox" hidden>
      <div class="lightbox-panel" role="dialog" aria-modal="true" aria-labelledby="lightboxTitle">
        <div class="lightbox-top">
          <div class="lightbox-copy">
            <p id="lightboxHighway" class="eyebrow"></p>
            <h2 id="lightboxTitle" class="title"></h2>
          </div>
          <button id="lightboxClose" class="lightbox-close" type="button" aria-label="Close enlarged camera view">Close</button>
        </div>
        <img id="lightboxImage" class="lightbox-image" alt="" />
      </div>
    </div>

    <script>
      const grid = document.getElementById("grid");
      const meta = document.getElementById("meta");
      const errorBox = document.getElementById("error");
      const emptyBox = document.getElementById("empty");
      const refreshButton = document.getElementById("refreshButton");
      const lightbox = document.getElementById("lightbox");
      const lightboxImage = document.getElementById("lightboxImage");
      const lightboxTitle = document.getElementById("lightboxTitle");
      const lightboxHighway = document.getElementById("lightboxHighway");
      const lightboxClose = document.getElementById("lightboxClose");

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => (
          {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "\"": "&quot;",
            "'": "&#39;"
          }[char]
        ));
      }

      function renderFeeds(feeds) {
        grid.innerHTML = feeds.map((feed) => `
          <article
            class="card"
            data-image-src="${feed.image_src}"
            data-camera-name="${escapeHtml(feed.camera_name)}"
            data-highway-name="${escapeHtml(feed.highway_name)}"
            tabindex="0"
            role="button"
            aria-label="Open larger view for ${escapeHtml(feed.camera_name)}"
          >
            <img src="${feed.image_src}" alt="${escapeHtml(feed.camera_name)}" />
            <div class="card-body">
              <p class="eyebrow">${escapeHtml(feed.highway_name)}</p>
              <h2 class="title">${escapeHtml(feed.camera_name)}</h2>
              <div class="footer">Source: LLM public CCTV feed</div>
            </div>
          </article>
        `).join("");
      }

      function openLightbox(card) {
        lightboxImage.src = card.dataset.imageSrc;
        lightboxImage.alt = card.dataset.cameraName;
        lightboxTitle.textContent = card.dataset.cameraName;
        lightboxHighway.textContent = card.dataset.highwayName;
        lightbox.hidden = false;
        document.body.style.overflow = "hidden";
      }

      function closeLightbox() {
        lightbox.hidden = true;
        lightboxImage.removeAttribute("src");
        document.body.style.overflow = "";
      }

      async function loadFeeds() {
        refreshButton.disabled = true;
        errorBox.hidden = true;
        emptyBox.hidden = true;
        meta.textContent = "Loading live feeds…";

        try {
          const response = await fetch("/api/feeds", { cache: "no-store" });
          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.error || "Unable to load feeds.");
          }

          const feeds = payload.feeds.filter((feed) => feed.image_src);

          meta.textContent = `${feeds.length} live feeds loaded. Updated ${new Date(payload.fetched_at).toLocaleString()}.`;

          if (feeds.length === 0) {
            grid.innerHTML = "";
            emptyBox.hidden = false;
            return;
          }

          renderFeeds(feeds);
        } catch (error) {
          grid.innerHTML = "";
          errorBox.hidden = false;
          errorBox.textContent = error.message;
          meta.textContent = "Refresh failed.";
        } finally {
          refreshButton.disabled = false;
        }
      }

      grid.addEventListener("click", (event) => {
        const card = event.target.closest(".card");

        if (!card) {
          return;
        }

        openLightbox(card);
      });

      grid.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") {
          return;
        }

        const card = event.target.closest(".card");

        if (!card) {
          return;
        }

        event.preventDefault();
        openLightbox(card);
      });

      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });

      lightboxClose.addEventListener("click", closeLightbox);

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !lightbox.hidden) {
          closeLightbox();
        }
      });

      refreshButton.addEventListener("click", loadFeeds);
      loadFeeds();
    </script>
  </body>
</html>
