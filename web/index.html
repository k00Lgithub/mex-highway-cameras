<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selangor Highway Cameras</title>
    <style>
      :root {
        --bg: #f3efe7;
        --panel: rgba(255, 252, 246, 0.82);
        --text: #1d2a22;
        --muted: #506154;
        --accent: #0b6e4f;
        --accent-2: #d96c06;
        --border: rgba(29, 42, 34, 0.12);
        --shadow: 0 24px 60px rgba(26, 40, 32, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, rgba(217, 108, 6, 0.14), transparent 30%),
          radial-gradient(circle at top right, rgba(11, 110, 79, 0.14), transparent 28%),
          linear-gradient(180deg, #f9f5ee 0%, var(--bg) 100%);
      }

      .page {
        width: min(1200px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      .hero {
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 4.25rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .subtitle,
      .meta,
      .empty,
      .error {
        color: var(--muted);
      }

      .subtitle {
        max-width: 60ch;
        margin: 14px 0 0;
        font-size: 1.05rem;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 700;
        color: white;
        background: linear-gradient(135deg, var(--accent), #0a8f66);
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.04);
      }

      .meta {
        font-size: 0.95rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
        margin-top: 22px;
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 14px 32px rgba(26, 40, 32, 0.08);
      }

      .card img {
        display: block;
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        background: #e8e0d3;
      }

      .card-body {
        padding: 14px 16px 16px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--accent-2);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .title {
        margin: 0;
        font-size: 1.05rem;
      }

      .footer {
        margin-top: 8px;
        font-size: 0.92rem;
        color: var(--muted);
      }

      .empty,
      .error {
        margin-top: 18px;
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px dashed var(--border);
        background: rgba(255, 255, 255, 0.6);
      }

      @media (max-width: 720px) {
        .page {
          width: min(100% - 20px, 1200px);
          padding-top: 20px;
        }

        .hero {
          padding: 20px;
          border-radius: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>Selangor Highway Cameras</h1>
        <p class="subtitle">
          First 20 publicly available live camera feeds currently found from the
          official Lembaga Lebuhraya Malaysia public CCTV endpoints for
          Selangor-area highways.
        </p>
        <div class="actions">
          <button id="refreshButton" type="button">Refresh Feeds</button>
          <div id="meta" class="meta">Loading live feeds…</div>
        </div>
        <div id="error" class="error" hidden></div>
        <div id="empty" class="empty" hidden>No live feeds were available.</div>
        <section id="grid" class="grid" aria-live="polite"></section>
      </section>
    </main>

    <script>
      const grid = document.getElementById("grid");
      const meta = document.getElementById("meta");
      const errorBox = document.getElementById("error");
      const emptyBox = document.getElementById("empty");
      const refreshButton = document.getElementById("refreshButton");

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => (
          {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "\"": "&quot;",
            "'": "&#39;"
          }[char]
        ));
      }

      function renderFeeds(feeds) {
        grid.innerHTML = feeds.map((feed) => `
          <article class="card">
            <img src="${feed.image_src}" alt="${escapeHtml(feed.camera_name)}" />
            <div class="card-body">
              <p class="eyebrow">${escapeHtml(feed.highway_name)}</p>
              <h2 class="title">${escapeHtml(feed.camera_name)}</h2>
              <div class="footer">Source: LLM public CCTV feed</div>
            </div>
          </article>
        `).join("");
      }

      async function loadFeeds() {
        refreshButton.disabled = true;
        errorBox.hidden = true;
        emptyBox.hidden = true;
        meta.textContent = "Loading live feeds…";

        try {
          const response = await fetch("/api/feeds", { cache: "no-store" });
          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.error || "Unable to load feeds.");
          }

          const feeds = payload.feeds.filter((feed) => feed.image_src);

          meta.textContent = `${feeds.length} live feeds loaded. Updated ${new Date(payload.fetched_at).toLocaleString()}.`;

          if (feeds.length === 0) {
            grid.innerHTML = "";
            emptyBox.hidden = false;
            return;
          }

          renderFeeds(feeds);
        } catch (error) {
          grid.innerHTML = "";
          errorBox.hidden = false;
          errorBox.textContent = error.message;
          meta.textContent = "Refresh failed.";
        } finally {
          refreshButton.disabled = false;
        }
      }

      refreshButton.addEventListener("click", loadFeeds);
      loadFeeds();
    </script>
  </body>
</html>
